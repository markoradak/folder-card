name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC — Trusted Publisher
      contents: write # create GitHub release

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      # Node 24 ships with npm 11.x, which supports Trusted Publishers / OIDC.
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - run: pnpm -C packages/react typecheck

      - run: pnpm -C packages/react test

      - run: pnpm -C packages/react build

      # Decodes the JWT GitHub will send to npm and prints the claims
      # (repository, workflow, ref, etc.). Only runs when the workflow is
      # re-run with debug logging enabled — invaluable for diagnosing
      # Trusted Publisher config mismatches.
      - name: Print OIDC claims
        if: runner.debug == '1'
        run: |
          TOKEN=$(curl -sSL -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=npm:registry.npmjs.org" | jq -r .value)
          echo "$TOKEN" | cut -d. -f2 | base64 -d 2>/dev/null | jq .

      # Uses OIDC (Trusted Publisher on npmjs.com). No NPM_TOKEN required.
      # `--provenance` is applied automatically when publishing via OIDC.
      # We use `npm publish` (not `pnpm publish`) because pnpm hasn't yet
      # implemented the OIDC token exchange.
      - name: Publish to npm
        run: npm publish
        working-directory: packages/react

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          tag_name: ${{ github.ref_name }}
